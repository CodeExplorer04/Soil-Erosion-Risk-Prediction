<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soil Loss Prediction System</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="card">

        <h1> Soil Loss Prediction System</h1>
        <label>State</label>
        <input type="text" id="state" placeholder="Enter State">

        <label>District</label>
        <input type="text" id="district" placeholder="Enter District">

        <label>Monthly Rainfall (mm)</label>
        <input type="number" id="rainfall" placeholder="Enter Rainfall">

        <button onclick="predictSoilLoss()">
            Predict Soil Loss
        </button>

        <div class="result" id="resultBox">

            <h2>Prediction Result</h2>

            <p>
                <strong>Soil Loss:</strong>
                <span id="soilLoss">-</span>
            </p>

            <p>
                <strong>Risk Level:</strong>
                <span id="riskLevel">-</span>
            </p>

            <p>
                <strong>Recommendation:</strong>
                <span id="recommendation">-</span>
            </p>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
